<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sunidhi</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: linear-gradient(to bottom, #000428, #004e92);
    font-family: Arial, sans-serif;
    color:white;
    text-align:center;
}

/* SKY STARS */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation: twinkle 2s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

/* NAME COMING FROM SKY */
#name{
    position:absolute;
    top:-100px;
    width:100%;
    font-size:60px;
    font-weight:bold;
    text-shadow:0 0 20px yellow, 0 0 40px orange;
    animation: drop 3s forwards;
}

@keyframes drop{
    to{ top:35%; }
}

/* CAKE */
#cake{
    position:absolute;
    top:45%;
    left:60%;
    font-size:80px;
    opacity:0;
    animation: showCake 3s forwards;
    animation-delay:3s;
}

@keyframes showCake{
    to{ opacity:1; }
}

/* FILE BOX */
#fileBox{
    position:absolute;
    top:30%;
    left:50%;
    transform:translateX(-50%) scale(0);
    width:400px;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    transition:1s;
}

#fileBox.open{
    transform:translateX(-50%) scale(1);
}

#fileBox h2{
    margin-top:0;
}

</style>
</head>

<body>

<div id="name">🎉 Happy Birthday Sunidhi 🎂</div>
<div id="cake">🎂</div>

<div id="fileBox">
    <h2>💌 Birthday Wishes</h2>
    <p>Wishing you happiness and success always! — Aryan</p>
    <p>Stay blessed and keep smiling! — Your Friends</p>
    <p>May all your dreams come true! — Family</p>
</div>

<script>

/* Create stars */
for(let i=0;i<100;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(1+Math.random()*2)+"s";
    document.body.appendChild(star);
}

/* Open file after cake appears */
setTimeout(()=>{
    document.getElementById("fileBox").classList.add("open");
},5000);

/* Close file and move name back to sky */
setTimeout(()=>{
    document.getElementById("fileBox").classList.remove("open");
},10000);

setTimeout(()=>{
    document.getElementById("name").style.top="-100px";
    document.getElementById("cake").style.opacity="0";
},12000);

</script>

</body>
</html>
